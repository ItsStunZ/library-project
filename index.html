<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Book Library</h1>
    </header>
    <button command="show-modal" commandfor="form-dialog" id="show-modal">Add Book</button>
    <dialog id="form-dialog">
        <form>
            <h1>Add Book</h1>

            <label for="title">Title</label>
            <input type="text" name="title" id="title" required>
            
            <label for="author">Author</label>
            <input type="text" name="author" id="author" required>

            <label for="pages">Pages</label>
            <input type="number" name="pages" id="pages" required>
        
            <div class="row">
                <label for="read">Read</label>
                <input type="checkbox" name="read" id="read" required>
            </div>
        </form>
        <div class="row">
            <button id="addbook-btn">Add</button>
            <button command="close" commandfor="form-dialog">Close</button>
        </div>
    </dialog>

    <div class="books-container">
        <!-- All new cards get added here -->
    </div>
    <script src="script.js"></script>
</body>
</html>
